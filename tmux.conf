# --- General Settings ---
# Set the prefix to Ctrl-a (common alternative to Ctrl-b)
# set -g prefix C-a
# unbind C-b
# bind C-a send-prefix

# Enable mouse support (clicking panes, resizing, scrolling)
set -g mouse on

# Increase scrollback history limit
set -g history-limit 10000

# Start window and pane numbering at 1 (easier to reach on keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Rename windows automatically to reflect the current program
setw -g automatic-rename on
# Renumber windows when one is closed
set -g renumber-windows on

# Set terminal colors
set -g default-terminal "screen-256color"

# Faster escape time (improves Vim experience)
set -s escape-time 0

# --- Keybindings ---
# Reload config file easily
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# Split panes using | and - (more intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# --- Appearance ---
# Status bar styling
set -g status-style bg=black,fg=white
set -g status-left-length 40
set -g status-left "#[fg=green]Session: #S #[fg=yellow]#I #[fg=cyan]#P"
set -g status-right "#[fg=cyan]%d %b %R"
set -g status-justify centre

# Highlight active window in status bar
setw -g window-status-current-style fg=black,bg=green

# Border colors for panes
set -g pane-border-style fg=white
set -g pane-active-border-style fg=green
